name: Package Enhanced Modules

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'Gemfile.plugins.local'

jobs:
  package:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create package directory
      run: |
        mkdir -p openproject-enhanced-modules
    
    - name: Copy modules
      run: |
        cp -r modules openproject-enhanced-modules/
    
    - name: Copy config file
      run: |
        cp Gemfile.plugins.local openproject-enhanced-modules/
    
    - name: Create install script
      run: |
        cat > openproject-enhanced-modules/INSTALL.sh << 'EOF'
        #!/bin/bash
        set -e
        echo "OpenProject Enhanced Modules Installer"
        echo "Usage: bash INSTALL.sh <openproject_dir>"
        OP_DIR="${1:-/app}"
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        echo "Installing to: $OP_DIR"
        cp -r "$SCRIPT_DIR/modules/"* "$OP_DIR/modules/"
        cp "$SCRIPT_DIR/Gemfile.plugins.local" "$OP_DIR/"
        cd "$OP_DIR"
        bundle config set without 'development test'
        bundle install --jobs 4 --retry 3
        bundle exec rake db:migrate RAILS_ENV=production
        echo "Installation complete!"
        EOF
        chmod +x openproject-enhanced-modules/INSTALL.sh
    
    - name: Create README
      run: |
        cat > openproject-enhanced-modules/README.md << 'EOF'
        # OpenProject Enhanced Modules
        
        ## Modules Included
        
        1. Database Manager - Multi-database management, backup/restore
        2. Analytics - Project statistics and reports
        3. MS Project Import/Export - Excel/XML/MS Project format support
        
        ## Installation
        
        ```bash
        # Extract
        tar -xzf openproject-enhanced-modules-*.tar.gz
        cd openproject-enhanced-modules
        
        # Install (replace /app with your OpenProject path)
        bash INSTALL.sh /app
        ```
        
        ## Requirements
        
        - OpenProject: 15.0.0
        - Ruby: 3.2.x
        - PostgreSQL: 13+
        EOF
    
    - name: Create package
      run: |
        PACKAGE_NAME="openproject-enhanced-modules-$(date +%Y%m%d-%H%M%S).tar.gz"
        tar -czf "$PACKAGE_NAME" openproject-enhanced-modules/
        echo "Package created: $PACKAGE_NAME"
        du -h "$PACKAGE_NAME"
        echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: enhanced-modules-package
        path: ${{ env.PACKAGE_NAME }}
        retention-days: 90
    
    - name: Summary
      run: |
        echo "==================================="
        echo "Package created successfully!"
        echo "==================================="
        echo ""
        echo "Download the artifact from the 'Artifacts' section below."
        echo ""
        echo "Installation:"
        echo "1. Download and extract"
        echo "2. Run: bash INSTALL.sh /app"

name: Build OpenProject for Offline Deployment

on:
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'Gemfile*'
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libpq-dev \
          libsqlite3-dev \
          libffi-dev \
          libssl-dev \
          libxml2-dev \
          libxslt1-dev \
          libreadline-dev \
          zlib1g-dev \
          build-essential \
          patch \
          ruby-dev
    
    - name: Update Bundler
      run: |
        gem update --system
        bundle update --bundler
    
    - name: Install Ruby dependencies
      run: |
        # 确保 Gemfile 存在
        if [ ! -f "Gemfile" ]; then
          echo "Error: Gemfile not found!"
          exit 1
        fi
        
        # 配置 Bundler
        bundle config set deployment false
        bundle config set without 'development test'
        
        # 安装依赖（增加重试）
        bundle install --jobs 4 --retry 3 || {
          echo "First attempt failed, retrying..."
          bundle install --jobs 4 --retry 3
        }
    
    - name: Install Node dependencies
      run: |
        if [ -d "frontend" ] && [ -f "frontend/package.json" ]; then
          cd frontend
          npm ci || npm install
        fi
    
    - name: Compile frontend assets
      run: |
        if [ -d "frontend" ]; then
          cd frontend
          npm run build || echo "Frontend build failed, continuing..."
        fi
    
    - name: Precompile Rails assets
      run: |
        bundle exec rake assets:precompile || echo "Asset precompile failed, continuing..."
        bundle exec rake assets:clean
    
    - name: Create deployment package
      run: |
        # 创建部署包
        PACKAGE_NAME="openproject-deploy-$(date +%Y%m%d-%H%M%S).tar.gz"
        
        tar -czf "$PACKAGE_NAME" \
          --exclude='.git' \
          --exclude='tmp/*' \
          --exclude='log/*' \
          --exclude='.github/*' \
          --exclude='node_modules' \
          --exclude='vendor/bundle/ruby/*/cache' \
          .
        
        echo "Package created: $PACKAGE_NAME"
        du -h "$PACKAGE_NAME"
    
    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: openproject-deployment
        path: openproject-deploy-*.tar.gz
        retention-days: 30
    
    - name: Notify completion
      if: always()
      run: |
        echo "==================================="
        echo "Build Status: ${{ job.status }}"
        echo "==================================="
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ 编译成功！"
          ls -lh openproject-deploy-*.tar.gz
        else
          echo "❌ 编译失败"
          exit 1
        fi
